name: Sync README to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki || (
            mkdir wiki &&
            cd wiki &&
            git init &&
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
          )

      - name: Copy README.md to wiki
        run: |
          cp README.md wiki/Home.md

      - name: Commit and push to wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync README.md to wiki [skip ci]"
            git push origin HEAD
          fi
